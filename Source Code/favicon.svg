<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Brand-aligned Graphite/Blue Horizon Favicon -->
  <defs>
    <clipPath id="rounded">
      <rect x="0" y="0" width="512" height="512" rx="60" ry="60" />
    </clipPath>
  </defs>
  
  <g clip-path="url(#rounded)">
    <!-- Top Half (Source/LaTeX) -->
    <rect x="0" y="0" width="512" height="256" fill="#0E1116" />
    <!-- Bottom Half (Render/Output) -->
    <rect x="0" y="256" width="512" height="256" fill="#2F81F7" />
    
    <!-- LaTeX Text (Serif/Academic) -->
    <text x="256" y="180" font-family="'Times New Roman', serif" font-size="140" font-weight="600" fill="white" text-anchor="middle" letter-spacing="-5">L<tspan baseline-shift="30" font-size="100">A</tspan>T<tspan baseline-shift="-15" font-size="140">E</tspan>X</text>
    
    <!-- RENDER Text (Modern/Sans) -->
    <text x="256" y="415" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="110" font-weight="800" fill="white" text-anchor="middle" letter-spacing="-2">RENDER</text>
  </g>
</svg>
