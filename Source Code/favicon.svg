<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Official LaTeX Branding Favicon -->
  <defs>
    <clipPath id="rounded">
      <rect x="0" y="0" width="512" height="512" rx="72" ry="72" />
    </clipPath>
  </defs>
  
  <g clip-path="url(#rounded)">
    <!-- Top Half (Deep Navy #0A0D11 for maximum premium contrast) -->
    <rect x="0" y="0" width="512" height="256" fill="#0A0D11" />
    <!-- Bottom Half (Vibrant Brand Blue #2F81F7) -->
    <rect x="0" y="256" width="512" height="256" fill="#2F81F7" />
    
    <!-- Precise LaTeX Logo with Official Knuth Kerning/Offsets -->
    <text x="256" y="180" font-family="'Times New Roman', serif" font-size="160" font-weight="700" fill="#E6EDF3" text-anchor="middle">
      L<tspan dy="-35" font-size="110" dx="-45">A</tspan><tspan dy="35" dx="-25">T</tspan><tspan dy="25" dx="-30">E</tspan><tspan dy="-25" dx="-25">X</tspan>
    </text>
    
    <!-- RENDER Brand Identity (Modern UI font) -->
    <text x="256" y="420" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="120" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-1.5">RENDER</text>
  </g>
</svg>
