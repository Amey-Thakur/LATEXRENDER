<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A dependency-free, high-performance LaTeX rendering engine that exports to 14 native and legacy formats purely inside the browser.">
    <meta name="author" content="Amey Thakur">
    
    <!-- Open Graph for social sharing -->
    <meta property="og:title" content="LATEXRENDER | Client-side Math Rendering Engine">
    <meta property="og:description" content="Dependency-free LaTeX parsing. Renders to 14 file formats natively offline.">
    <meta property="og:type" content="website">

    <title>LATEXRENDER</title>
    
    <!-- Premium Branding Icons -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="alternate icon" type="image/x-icon" href="favicon.ico">
    
    <!-- Google Fonts - Play -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Fira+Code:wght@400;500&family=Inter:wght@400;600&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,600;1,400&family=Merriweather:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@400;600&family=Outfit:wght@400;600&family=Play:wght@400;700&family=STIX+Two+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <!-- Vendored KaTeX Engine (Zero external dependencies) -->
    <link rel="stylesheet" href="vendor/katex/katex.min.css">
    
    <!-- Application Styles -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/editor.css">
    <link rel="stylesheet" href="css/preview.css">
    <link rel="stylesheet" href="css/controls.css">
    <link rel="stylesheet" href="css/history.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="css/toast.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/tooltips.css">
</head>
<body>

    <header class="app-header">
        <div class="brand-logotype" data-tooltip="LATEXRENDER Engine">
            <span class="latex-logo">L<span class="a">A</span>T<span class="e">E</span>X</span><span class="brand-render">RENDER</span>
        </div>
        <div class="header-actions">
            <div class="action-group">
                <button id="btn-history" class="icon-button contained" aria-label="View history" data-tooltip="Formula history log">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path><path d="M12 7v5l4 2"></path></svg>
                </button>
                <button id="btn-settings-toggle" class="icon-button contained" aria-label="Toggle configurations" data-tooltip="Render settings">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                </button>
                <button id="btn-share" class="icon-button contained" aria-label="Share formula" data-tooltip="Copy share link">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
                </button>
            </div>
            
            <button id="theme-toggle" class="icon-button" aria-label="Toggle dark mode" data-tooltip="Switch light/dark">
                <svg id="theme-icon-sun" class="theme-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                <svg id="theme-icon-moon" class="theme-icon hidden" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            </button>
            <a href="https://github.com/Amey-Thakur/LATEXRENDER" target="_blank" class="icon-button github-link" aria-label="GitHub Repository" data-tooltip="Source code">
                <svg height="24" viewBox="0 0 16 16" width="24" aria-hidden="true" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path></svg>
            </a>
        </div>
    </header>

    <main class="workspace">
        <!-- History Drawer (Left Side) -->
        <aside class="pane-history hidden">
            <div class="history-header">
                <span>Recent Renderings</span>
                <button id="btn-history-clear" class="btn-text" title="Clear All History">Clear</button>
            </div>
            <div class="history-body">
                <!-- Items populated by history.js -->
                <div class="empty-state">No recent formulas.</div>
            </div>
        </aside>

        <!-- Editor View (Left Pane) -->
        <section class="pane-editor">
            <div class="editor-header">Source Code</div>
            <div class="editor-container">
                <textarea id="latex-editor" spellcheck="false" placeholder="% Type your LaTeX equation here...
\int_0^\infty e^{-x^2} dx = \frac{\sqrt{\pi}}{2}"></textarea>
            </div>
        </section>

        <!-- Rendered Output (Middle Pane) -->
        <section class="pane-preview">
            <div class="preview-header">Live Preview</div>
            <div class="preview-stage">
                <!-- Inner container forms the white "paper" -->
                <div id="preview-container">
                    <!-- KaTeX DOM gets injected here -->
                </div>
                <!-- Validation/Syntax errors show up here -->
                <div id="error-message"></div>
            </div>
        </section>

        <!-- Settings & Export (Right Pane) -->
        <aside class="pane-controls">
            <div class="controls-header">Configurations</div>
            <div class="controls-body">
                <div class="control-group">
                    <label for="setting-font">Typography</label>
                    <select id="setting-font" class="input-select">
                        <optgroup label="Scientific & Academic">
                            <option value="KaTeX_Main" selected>Computer Modern (LaTeX Default)</option>
                            <option value="STIX Two Text">STIX Two (Scholarly Publishing)</option>
                            <option value="KaTeX_Math">KaTeX Math (Italic Symbols)</option>
                        </optgroup>
                        <optgroup label="Modern Sans-Serif">
                            <option value="Play">Play (Application Font)</option>
                            <option value="Inter">Inter (Professional)</option>
                            <option value="Outfit">Outfit (Thin & Elegant)</option>
                            <option value="Montserrat">Montserrat (Geometric)</option>
                            <option value="Arial">Arial (System Standard)</option>
                        </optgroup>
                        <optgroup label="Traditional Serif">
                            <option value="EB Garamond">EB Garamond (Classic Academic)</option>
                            <option value="Libre Baskerville">Libre Baskerville (High Contrast)</option>
                            <option value="Lora">Lora (Journal Style)</option>
                            <option value="Times New Roman">Times New Roman (Standard)</option>
                        </optgroup>
                        <optgroup label="Technical Monospaced">
                            <option value="Fira Code">Fira Code (Code Ligatures)</option>
                            <option value="Courier New">Courier (Technical Typewriter)</option>
                        </optgroup>
                    </select>
                </div>

                <div class="control-group">
                    <div class="control-row">
                        <label for="setting-size">Base Scale</label>
                        <span id="setting-size-val" class="color-hex">36px</span>
                    </div>
                    <input type="range" id="setting-size" class="input-range" min="12" max="150" value="36" data-tooltip="Set equation size" oninput="document.getElementById('setting-size-val').innerText = this.value + 'px'">
                </div>

                <div class="control-group">
                    <div class="control-row">
                        <label for="setting-padding">Canvas Spacing</label>
                        <span id="setting-padding-val" class="color-hex">40px</span>
                    </div>
                    <input type="range" id="setting-padding" class="input-range" min="0" max="120" value="40" data-tooltip="Set outer padding" oninput="document.getElementById('setting-padding-val').innerText = this.value + 'px'">
                </div>

                <div class="control-group">
                    <label>Foreground Trace</label>
                    <div class="color-picker-wrapper" data-tooltip="Equation color">
                        <input type="color" id="setting-color-fg" class="input-color" value="#000000">
                        <span class="color-hex" id="setting-color-fg-val">#000000</span>
                        <script>document.getElementById('setting-color-fg').addEventListener('input', e => document.getElementById('setting-color-fg-val').innerText = e.target.value.toUpperCase());</script>
                    </div>
                </div>

                <div class="control-group">
                    <label>Background Fill</label>
                    <div class="color-picker-wrapper" data-tooltip="Stage color">
                        <input type="color" id="setting-color-bg" class="input-color" value="#FFFFFF">
                        <span class="color-hex" id="setting-color-bg-val">#FFFFFF</span>
                        <script>document.getElementById('setting-color-bg').addEventListener('input', e => document.getElementById('setting-color-bg-val').innerText = e.target.value.toUpperCase());</script>
                    </div>
                </div>

                <label class="control-toggle" data-tooltip="Remove background from exports">
                    <input type="checkbox" id="setting-transparent" class="input-checkbox">
                    Transparent Background
                </label>

                <label class="control-toggle" data-tooltip="Centered math display mode">
                    <input type="checkbox" id="setting-displayMode" class="input-checkbox" checked>
                    Math Display Mode (Centered)
                </label>

                <div class="action-box">
                    <label for="export-format">Export Format</label>
                    <select id="export-format" class="input-select" data-tooltip="Select output format">
                        <optgroup label="Raster (Native)">
                            <option value="png">PNG (Portable Network Graphics)</option>
                            <option value="jpg">JPEG (Joint Photographic Experts)</option>
                            <option value="webp">WEBP (Web Picture Format)</option>
                            <option value="avif">AVIF (AV1 Image File)</option>
                            <option value="gif">GIF (Graphics Interchange)</option>
                            <option value="bmp">BMP (Windows Bitmap)</option>
                            <option value="tiff">TIFF (Tagged Image File)</option>
                        </optgroup>
                        <optgroup label="Vector (Native)">
                            <option value="svg">SVG (Scalable Vector Graphics)</option>
                        </optgroup>
                        <optgroup label="Document & Legacy">
                            <option value="pdf">PDF (Portable Document)</option>
                            <option value="eps">EPS (Encapsulated PostScript)</option>
                            <option value="ps">PS (PostScript Document)</option>
                            <option value="ico">ICO (Windows Icon)</option>
                            <option value="emf">EMF (Enhanced Metafile)</option>
                            <option value="wmf">WMF (Windows Metafile)</option>
                        </optgroup>
                    </select>
                    <button class="btn-primary" id="btn-export" data-tooltip="Download render result">Export Render</button>
                </div>

            </div>
        </aside>
    </main>

    <!-- Custom Confirmation Modal -->
    <div id="custom-modal" class="modal-overlay hidden">
        <div class="modal-box">
            <h3 id="modal-title">Confirm Action</h3>
            <p id="modal-message">Are you sure you want to proceed?</p>
            <div class="modal-actions">
                <button id="modal-cancel" class="btn-secondary">Cancel</button>
                <button id="modal-confirm" class="btn-danger">Confirm</button>
            </div>
        </div>
    </div>

    <!-- Vendored KaTeX Script -->
    <script defer src="vendor/katex/katex.min.js"></script>
    
    <!-- Application Logic -->
    <script defer src="js/utils.js"></script>
    <script defer src="js/modal.js"></script>
    <script defer src="js/toast.js"></script>
    <script defer src="js/settings.js"></script>
    <script defer src="js/share.js"></script>
    <script defer src="js/history.js"></script>
    <script defer src="js/tooltips.js"></script>
    <script defer src="js/capture.js"></script>
    <script defer src="js/formats/raster.js"></script>
    <script defer src="js/formats/document.js"></script>
    <script defer src="js/formats/vector.js"></script>
    <script defer src="js/formats/icon.js"></script>
    <script defer src="js/formats/metafile.js"></script>
    <script defer src="js/exporter.js"></script>
    <script defer src="js/editor.js"></script>
    <script defer src="js/renderer.js"></script>
    <script defer src="js/app.js"></script>

</body>
</html>
