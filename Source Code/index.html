<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LATEXRENDER</title>
    
    <!-- Vendored KaTeX Engine (Zero external dependencies) -->
    <link rel="stylesheet" href="vendor/katex/katex.min.css">
    
    <!-- Application Styles -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/editor.css">
    <link rel="stylesheet" href="css/preview.css">
    <link rel="stylesheet" href="css/controls.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body>

    <header class="app-header">
        <div class="brand-logotype">LATEXRENDER</div>
    </header>

    <main class="workspace">
        <!-- Editor View (Left Pane) -->
        <section class="pane-editor">
            <div class="editor-header">Source Code</div>
            <div class="editor-container">
                <textarea id="latex-editor" spellcheck="false" placeholder="% Type your LaTeX equation here...
\int_0^\infty e^{-x^2} dx = \frac{\sqrt{\pi}}{2}"></textarea>
            </div>
        </section>

        <!-- Rendered Output (Middle Pane) -->
        <section class="pane-preview">
            <div class="preview-header">Live Preview</div>
            <div class="preview-stage">
                <!-- Inner container forms the white "paper" -->
                <div id="preview-container">
                    <!-- KaTeX DOM gets injected here -->
                </div>
                <!-- Validation/Syntax errors show up here -->
                <div id="error-message"></div>
            </div>
        </section>

        <!-- Settings & Export (Right Pane) -->
        <aside class="pane-controls">
            <div class="controls-header">Configurations</div>
            <div class="controls-body">
                
                <div class="control-group">
                    <label for="setting-font">Typography</label>
                    <select id="setting-font" class="input-select">
                        <option value="KaTeX_Main">Computer Modern (Serif)</option>
                        <option value="KaTeX_SansSerif">Helvetica (Sans)</option>
                        <option value="KaTeX_Math">KaTeX Math (Italic)</option>
                        <option value="Courier New">Courier (Monospace)</option>
                        <option value="Arial">Arial</option>
                        <option value="Times New Roman">Times New Roman</option>
                    </select>
                </div>

                <div class="control-group">
                    <div class="control-row">
                        <label for="setting-size">Base Scale</label>
                        <span id="setting-size-val" class="color-hex">36px</span>
                    </div>
                    <input type="range" id="setting-size" class="input-range" min="12" max="150" value="36" oninput="document.getElementById('setting-size-val').innerText = this.value + 'px'">
                </div>

                <div class="control-group">
                    <div class="control-row">
                        <label for="setting-padding">Canvas Spacing</label>
                        <span id="setting-padding-val" class="color-hex">40px</span>
                    </div>
                    <input type="range" id="setting-padding" class="input-range" min="0" max="120" value="40" oninput="document.getElementById('setting-padding-val').innerText = this.value + 'px'">
                </div>

                <div class="control-group">
                    <label>Foreground Trace</label>
                    <div class="color-picker-wrapper">
                        <input type="color" id="setting-color-fg" class="input-color" value="#000000">
                        <span class="color-hex" id="setting-color-fg-val">#000000</span>
                        <script>document.getElementById('setting-color-fg').addEventListener('input', e => document.getElementById('setting-color-fg-val').innerText = e.target.value.toUpperCase());</script>
                    </div>
                </div>

                <div class="control-group">
                    <label>Background Fill</label>
                    <div class="color-picker-wrapper">
                        <input type="color" id="setting-color-bg" class="input-color" value="#FFFFFF">
                        <span class="color-hex" id="setting-color-bg-val">#FFFFFF</span>
                        <script>document.getElementById('setting-color-bg').addEventListener('input', e => document.getElementById('setting-color-bg-val').innerText = e.target.value.toUpperCase());</script>
                    </div>
                </div>

                <label class="control-toggle">
                    <input type="checkbox" id="setting-transparent" class="input-checkbox">
                    Transparent Background
                </label>

                <label class="control-toggle">
                    <input type="checkbox" id="setting-displayMode" class="input-checkbox" checked>
                    Math Display Mode (Centered)
                </label>

                <!-- Export Actions -->
                <div class="action-box">
                    <label for="export-format">Export Format</label>
                    <select id="export-format" class="input-select">
                        <optgroup label="Raster (Native)">
                            <option value="png">PNG (Portable Network Graphics)</option>
                            <option value="jpg">JPEG (Joint Photographic Experts)</option>
                            <option value="webp">WEBP (Web Picture Format)</option>
                            <option value="avif">AVIF (AV1 Image File)</option>
                            <option value="gif">GIF (Graphics Interchange)</option>
                            <option value="bmp">BMP (Windows Bitmap)</option>
                            <option value="tiff">TIFF (Tagged Image File)</option>
                        </optgroup>
                        <optgroup label="Vector (Native)">
                            <option value="svg">SVG (Scalable Vector Graphics)</option>
                        </optgroup>
                        <optgroup label="Document & Legacy">
                            <option value="pdf">PDF (Portable Document)</option>
                            <option value="eps">EPS (Encapsulated PostScript)</option>
                            <option value="ps">PS (PostScript Document)</option>
                            <option value="ico">ICO (Windows Icon)</option>
                            <option value="emf">EMF (Enhanced Metafile)</option>
                            <option value="wmf">WMF (Windows Metafile)</option>
                        </optgroup>
                    </select>
                    <!-- Button logic will be wired in Phase 3 -->
                    <button class="btn-primary" id="btn-export">Export Render</button>
                </div>

            </div>
        </aside>
    </main>

    <!-- Vendored KaTeX Script -->
    <script defer src="vendor/katex/katex.min.js"></script>
    
    <!-- Application Logic -->
    <script defer src="js/utils.js"></script>
    <script defer src="js/settings.js"></script>
    <script defer src="js/formats/raster.js"></script>
    <script defer src="js/formats/document.js"></script>
    <script defer src="js/formats/vector.js"></script>
    <script defer src="js/formats/icon.js"></script>
    <script defer src="js/formats/metafile.js"></script>
    <script defer src="js/exporter.js"></script>
    <script defer src="js/editor.js"></script>
    <script defer src="js/renderer.js"></script>
    <script defer src="js/app.js"></script>

</body>
</html>
