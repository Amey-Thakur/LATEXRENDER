<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Equation Not Balanced | LATEXRENDER</title>
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg">

    <!-- Modern Typography & Iconography -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Play:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap" rel="stylesheet"> <!-- For math look -->

    <style>
        :root {
            --bg-color: #0d1117;
            --surface-color: #161b22;
            --text-primary: #c9d1d9;
            --text-secondary: #8b949e;
            --accent-color: #2f81f7;
            --accent-hover: #388bfd;
            --error-color: #f85149;
            --border-color: #30363d;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Play', sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
        }

        /* Abstract Grid Background representing graphing paper */
        .grid-bg {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(var(--border-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--border-color) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.15;
            z-index: 1;
        }

        .error-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        .error-code {
            font-family: 'Fira Code', monospace;
            font-size: 10rem;
            color: var(--accent-color);
            font-weight: 700;
            margin: 0;
            line-height: 1;
            position: relative;
            text-shadow: 4px 4px 0 var(--surface-color), 8px 8px 0 rgba(47, 129, 247, 0.2);
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        .math-icon {
            font-size: 4rem;
            color: var(--error-color);
            margin-bottom: 20px;
            filter: drop-shadow(0 0 15px rgba(248, 81, 73, 0.4));
            animation: pulse-glow 2s infinite alternate;
        }

        @keyframes pulse-glow {
            from { filter: drop-shadow(0 0 5px rgba(248, 81, 73, 0.3)); transform: scale(1); }
            to { filter: drop-shadow(0 0 20px rgba(248, 81, 73, 0.6)); transform: scale(1.05); }
        }

        .error-message {
            font-size: 1.5rem;
            color: var(--text-secondary);
            margin-top: 10px;
            margin-bottom: 40px;
            max-width: 550px;
            line-height: 1.5;
        }

        .math-snippet {
            font-family: 'Fira Code', monospace;
            background-color: var(--surface-color);
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            color: var(--error-color);
        }

        .btn-home {
            background: var(--accent-color);
            color: #ffffff;
            padding: 14px 28px;
            border-radius: 6px; /* Matching LATEXRENDER main UI */
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(47, 129, 247, 0.3);
            border: 1px solid transparent;
        }

        .btn-home:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(47, 129, 247, 0.4);
        }

        footer {
            padding: 30px;
            text-align: center;
            border-top: 1px solid var(--border-color);
            background: var(--surface-color);
            font-size: 0.9rem;
            color: var(--text-secondary);
            position: relative;
            z-index: 10;
        }

        footer a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 700;
            transition: color 0.2s ease;
        }

        footer a:hover {
            color: var(--accent-hover);
            text-decoration: underline;
        }

        .latex-brand {
            font-weight: 700;
            letter-spacing: 0.05em;
        }
        
        .latex-brand .a {
            font-size: 0.7em;
            text-transform: uppercase;
            vertical-align: 0.15em;
            margin-left: -0.15em;
            margin-right: -0.15em;
        }
        
        .latex-brand .e {
            text-transform: uppercase;
            vertical-align: -0.15em;
            margin-left: -0.15em;
            margin-right: -0.15em;
        }
        
        .brand-render {
            font-weight: 400;
            opacity: 0.8;
            margin-left: 2px;
        }

    </style>
</head>

<body>
    <!-- Graphing paper aesthetic -->
    <div class="grid-bg"></div>

    <header style="padding: 24px; position: relative; z-index: 10; text-align: center;">
        <div style="font-size: 1.5rem; color: var(--text-primary);">
            <span class="latex-brand">L<span class="a">A</span>T<span class="e">E</span>X</span><span class="brand-render">RENDER</span>
        </div>
    </header>

    <div class="error-container">
        <div class="math-icon">
            <i class="fas fa-square-root-variable"></i>
        </div>
        <h1 class="error-code">404</h1>
        <p class="error-message">
            Syntax Error! The page you are looking for evaluates to <span class="math-snippet">\text{undefined}</span>. It might have been moved, deleted, or never existed in this coordinate plane.
        </p>

        <a href="index.html" class="btn-home">
            <i class="fas fa-terminal"></i> Return to Workspace
        </a>
    </div>

    <footer>
        <p>Designed & Developed by <a href="https://github.com/Amey-Thakur" target="_blank" rel="noopener">Amey Thakur</a></p>
    </footer>

</body>

</html>
