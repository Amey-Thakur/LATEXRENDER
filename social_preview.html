<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LATEXRENDER Social Identity</title>
    <style>
        :root {
            --bg-navy: #0A0D11;
            --brand-blue: #2F81F7;
            --text-primary: #E6EDF3;
            --text-secondary: #848D97;
            --font-ui: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            --font-serif: "Times New Roman", serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: var(--font-ui);
        }

        /* 1280x640 Scholarly/Premium Canvas */
        .canvas {
            width: 1280px;
            height: 640px;
            background-color: var(--bg-navy);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 2px solid #1a1a1a;
        }

        /* Background Grid Pattern (Subtle SEO/Tech vibe) */
        .grid {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            mask-image: radial-gradient(circle at 50% 50%, black, transparent 80%);
            pointer-events: none;
        }

        /* Branding Content */
        .content {
            z-index: 10;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            transform: translateY(-30px); /* Slightly shift up for better spacing below */
        }

        /* The Perfected LaTeX Logo */
        .latex-logo {
            font-family: var(--font-serif);
            font-size: 180px;
            font-weight: 700;
            color: white;
            display: flex;
            align-items: baseline;
            letter-spacing: -2px;
        }

        .latex-logo .a {
            font-size: 0.70em;
            text-transform: uppercase;
            margin-left: -0.36em;
            margin-right: -0.15em;
            position: relative;
            top: -0.32em;
        }

        .latex-logo .e {
            font-size: 1em;
            text-transform: uppercase;
            margin-left: -0.18em;
            margin-right: -0.12em;
            position: relative;
            top: 0.22em;
        }

        .render-logo {
            font-family: var(--font-ui);
            font-size: 140px;
            font-weight: 900;
            letter-spacing: -6px;
            margin-left: 20px;
            background: linear-gradient(180deg, white, var(--brand-blue));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .description {
            color: var(--text-secondary);
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            max-width: 900px;
            line-height: 1.6;
        }

        /* Footer / Credits */
        .footer {
            position: absolute;
            bottom: 60px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 80px;
            align-items: flex-end;
        }

        .signature {
            color: white;
            font-size: 24px; /* Increased for premium readability */
            font-weight: 500;
            letter-spacing: 0.1em;
            opacity: 0.9;
        }

        .signature span {
            color: var(--brand-blue);
            font-weight: 800;
        }

        .badge-grid {
            display: flex;
            gap: 24px;
        }

        .badge {
            padding: 8px 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.15em;
        }

        /* Branding Blue Bar */
        .bottom-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 8px;
            background: var(--brand-blue);
        }
    </style>
</head>
<body>

    <div class="canvas">
        <div class="grid"></div>
        
        <div class="content">
            <div class="latex-logo">
                L<span class="a">A</span>T<span class="e">E</span>X <span class="render-logo">RENDER</span>
            </div>
            
            <p class="description">
                Autonomous Client-Side<br>Mathematical Rendering Engine
            </p>
        </div>

        <div class="footer">
            <div class="badge-grid">
                <div class="badge">Academic Precision</div>
                <div class="badge">Offline Engine</div>
                <div class="badge">High Performance</div>
            </div>
            
            <div class="signature">
                ENGINEERED BY <span>AMEY THAKUR</span>
            </div>
        </div>

        <div class="bottom-bar"></div>
    </div>

</body>
</html>
